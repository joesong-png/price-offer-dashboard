// ── 3. 일별 → 주별 OFF율 집계 ────────────────────────────────────────
function getMonday(dateStr) {
  const d = new Date(dateStr + 'T00:00:00Z');
  const dow = d.getUTCDay();
  const diff = (dow === 0) ? -6 : 1 - dow;
  d.setUTCDate(d.getUTCDate() + diff);
  return d.toISOString().slice(0, 10);
}

const offByWeek = {};
dailyOff.forEach(([ymd,,, ratio]) => {
  const wk = getMonday(ymd);
  if (!offByWeek[wk]) offByWeek[wk] = { sum: 0, cnt: 0 };
  offByWeek[wk].sum += ratio;
  offByWeek[wk].cnt += 1;
});
const weeklyOff = {};
Object.entries(offByWeek).forEach(([wk, v]) => {
  weeklyOff[wk] = +(v.sum / v.cnt).toFixed(2);
});

// ── 4. 병합 & 시간순 정렬 ────────────────────────────────────────────
const merged = weeklyRaw
  .filter(d => weeklyOff[d.w] !== undefined)
  .sort((a, b) => a.w.localeCompare(b.w));

const labels   = merged.map(d => d.w.slice(2, 10)); // yy-mm-dd
const volumes  = merged.map(d => d.total);
const cvrs     = merged.map(d => d.cvr);
const offRates = merged.map(d => weeklyOff[d.w]);

// ── 5. 메트릭 카드 ──────────────────────────────────────────────────
(function renderCards() {
  const last  = merged[merged.length - 2]; // 전주 (금주는 진행중이라 제외)
  const prev  = merged[merged.length - 3];
  const offL  = weeklyOff[last.w];
  const offP  = weeklyOff[prev.w];

  // 역대 최대 볼륨 주
  const maxVol = Math.max(...merged.map(d => d.total));
  const minOff = Math.min(...offRates);

  const peakWeek = merged.find(d => d.total === maxVol);

  const cards = [
    {
      label: '최근 주간 제안수',
      value: (last.total / 1000).toFixed(1) + 'K',
      delta: ((last.total - prev.total) / prev.total * 100).toFixed(1) + '% vs 전주',
      up: last.total > prev.total
    },
    {
      label: '최근 결제 CVR',
      value: last.cvr + '%',
      delta: (last.cvr - prev.cvr).toFixed(1) + '%p vs 전주',
      up: last.cvr >= prev.cvr
    },
    {
      label: '최근 OFF율 (주평균)',
      value: offL.toFixed(1) + '%',
      delta: (offL - offP).toFixed(2) + '%p vs 전주',
      up: false, // OFF율은 낮을수록 good
      invert: true
    },
    {
      label: '볼륨 최대 주 OFF율',
      value: weeklyOff[peakWeek.w].toFixed(1) + '%',
      delta: peakWeek.w + ' (' + (peakWeek.total/1000).toFixed(0) + 'K)',
      up: null
    },
  ];

  const html = cards.map(c => {
    const isGood = c.up === null ? 'delta-neu' : (c.invert ? (!c.up ? 'delta-up' : 'delta-dn') : (c.up ? 'delta-up' : 'delta-dn'));
    return `<div class="card">
      <div class="card-label">${c.label}</div>
      <div class="card-value">${c.value}</div>
      <div class="card-delta ${isGood}">${c.delta}</div>
    </div>`;
  }).join('');
  document.getElementById('metricCards').innerHTML = html;
})();

      cls: '',
      title: '🎯 정책 시사점 — OFF율 낮추기가 핵심 레버',
      body: `<b>① 기본값 유지 전략</b>: 신규 등록 상품 default ON을 유지하되, 판매자가 OFF 설정하는 트리거(낮은 제안가, 잦은 역제안 등)를 분석해 경험 개선.<br><br><b>② 타겟 재활성화</b>: OFF 상태 장기 상품(30일↑) 판매자에게 "가격제안 ON 시 노출 증가" 넛지 → OFF율 2~3%p 낮추면 주간 볼륨 4~6K 회복 가능(선형 추정).<br><br><b>③ CVR 레버리지</b>: CVR 개선 추세를 활용해 볼륨 회복 시 결제 완료 건수 동반 상승 기대.`
    }
  ];
  const html = insights.map(i =>
    `<div class="insight ${i.cls}">
      <div class="insight-title">${i.title}</div>
      <div class="insight-body">${i.body}</div>
    </div>`
  ).join('');
  document.getElementById('insightCards').innerHTML = html;
})();

// ── 8. 산점도 ────────────────────────────────────────────────────────
(function renderScatter() {
  const ctx = document.getElementById('scatterChart').getContext('2d');

  // 색상: 시간 순서에 따라 블루→레드
  const n = merged.length;
  const scatterData = merged.map((d, i) => ({
    x: +(weeklyOff[d.w].toFixed(2)),
    y: d.total,
    label: d.w
  }));

  const colors = scatterData.map((_, i) => {
    const t = i / (n - 1);
    const r = Math.round(102 + (231 - 102) * t);
    const g = Math.round(126 + (76 - 126) * t);
    const b = Math.round(234 + (60 - 234) * t);
    return `rgba(${r},${g},${b},0.75)`;
  });

  // 선형회귀
  const xs = scatterData.map(d => d.x);
  const ys = scatterData.map(d => d.y);
  const xMean = xs.reduce((a,b)=>a+b,0)/xs.length;
  const yMean = ys.reduce((a,b)=>a+b,0)/ys.length;
  const num = xs.reduce((s,x,i) => s + (x-xMean)*(ys[i]-yMean), 0);
  const den = xs.reduce((s,x) => s + (x-xMean)**2, 0);
  const slope = num/den;
  const intercept = yMean - slope * xMean;
  const xMin = Math.min(...xs) - 0.2, xMax = Math.max(...xs) + 0.2;
  const regLine = [
    { x: xMin, y: slope * xMin + intercept },
    { x: xMax, y: slope * xMax + intercept }
  ];

  new Chart(ctx, {
    data: {
      datasets: [
        {
          type: 'scatter',
          label: '주차별 데이터',
          data: scatterData,
          backgroundColor: colors,
          pointRadius: 5,
          pointHoverRadius: 7,
          order: 2
        },
        {
          type: 'line',
          label: `회귀선 (기울기 ${(slope/1000).toFixed(1)}K/%p)`,
          data: regLine,
          borderColor: '#333',
          borderWidth: 1.5,
          borderDash: [5,3],
          pointRadius: 0,
          order: 1,
          tension: 0
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 12 } } },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.datasetIndex === 1) return null;
              const d = ctx.raw;
              return ` ${d.label}  |  OFF율 ${d.x}%  |  제안수 ${(d.y/1000).toFixed(1)}K`;
            }
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: 'OFF율 주평균 (%)', font: { size: 12 } },
          ticks: { callback: v => v + '%' }
        },
        y: {
          title: { display: true, text: '주간 가격제안 건수', font: { size: 12 } },
          ticks: { callback: v => (v/1000).toFixed(0) + 'K' }
        }
      }
    }
  });
})();
</script>
